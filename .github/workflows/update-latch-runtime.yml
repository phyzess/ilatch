name: Update Latch Runtime

on:
  schedule:
    - cron: "23 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-latch-runtime
  cancel-in-progress: false

jobs:
  update:
    name: Update @phyzess/latch
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Set up pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.1.1 --activate

      - name: Check latest runtime version
        id: runtime
        run: |
          current="$(node -p "require('./package.json').dependencies['@phyzess/latch'].replace(/^[~^]/, '')")"
          latest="$(npm view @phyzess/latch version)"

          echo "current=${current}" >> "$GITHUB_OUTPUT"
          echo "latest=${latest}" >> "$GITHUB_OUTPUT"

          if [ "$current" = "$latest" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "@phyzess/latch is already ${current}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Updating @phyzess/latch from ${current} to ${latest}." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update runtime dependency
        if: steps.runtime.outputs.changed == 'true'
        run: pnpm add "@phyzess/latch@${{ steps.runtime.outputs.latest }}"

      - name: Install dependencies
        if: steps.runtime.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build static assets
        if: steps.runtime.outputs.changed == 'true'
        run: pnpm build

      - name: Run template checks
        if: steps.runtime.outputs.changed == 'true'
        run: pnpm doctor

      - name: Commit runtime update
        if: steps.runtime.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore: update latch runtime to ${{ steps.runtime.outputs.latest }}"
          git push
